<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toro</title>
    <style>
        body {
            background-color: rgb(255, 175, 144);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .center {
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .top-space {
            margin-top: 5%;
        }

        .animation-container {
            position: relative;
            width: 100%;
            height: 100px;
            overflow: hidden;
        }

        .animated-element {
            position: absolute;
            top: 0;
            left: -8%;
            height: 100px;
            animation: toroin 10s linear infinite alternate;
        }

        .image-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3%;
        }

        @keyframes toroin {
            from {
                left: -8%;
            }
            to {
                left: 100%;
            }
        }
    </style>
</head>

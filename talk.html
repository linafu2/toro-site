<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>talk to toro</title>
    <style>
        body {
            background-color: rgba(255, 244, 182, 0.5);
        }

        .center {
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .top-space {
            margin-top: 5%;
        }

        .chat-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 50px;
            background: #FFFEF2;
            border-radius: 10px;
        }

        .message {
            padding: 10px 0;
        }

        .chat-form {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .chat-form input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid rgb(111, 78, 55);
            border-radius: 4px;
            margin-right: 10px;
        }

        .chat-form input[type="text"]:focus {
            outline: none;
            border-color: rgb(111, 78, 55);
            box-shadow: 0 0 5px pink;
        }

        .chat-form input[type="button"] {
            padding: 10px 20px;
            border: none;
            background-color: rgb(111, 78, 55);
            color: #FFFEF2;
            border-radius: 4px;
            cursor: pointer;
        }

        .chat-log {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid rgb(111, 78, 55);
            padding: 10px;
            border-radius: 4px;
        }

        .medsans {
            color: rgb(111, 78, 55);
            font-family: Assistant, sans-serif;
            font-size: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
<!--toro home button-->
<nav class="center top-space">
    <a href="./index.html"><img
            src="https://www.models-resource.com/resources/big_icons/45/44369.png?updated=1616444557"
            alt="toro" style="height:100px;"></a>
</nav>

<!--chatbot container-->
<div id="toro-chatbot" class="chat-container center medsans">
    <h2>talk to toro</h2>
    <div class="chat-log" id="chatLog"> </div>
    <div class="chat-form">
        <input type="text" id="chatInput" placeholder="talk...">
        <input type="button" value="submit" onclick="sendMessage()">
    </div>
    <div class="chat-form">
        <input type="button" value="clear chat" onclick="clearChat()">
    </div>    
</div>

<script>
    let messages = JSON.parse(localStorage.getItem('toroMessages')) || [];

    window.onload = () => {
    messages.forEach(msg => {
        addMessage(formatMessage(msg));
    });
    document.getElementById('chatInput').focus();
    };

    async function sendMessage() {
        const inputField = document.getElementById('chatInput');
        const message = inputField.value.trim();

        if (!message) return;

        // add user message to messages array
        const userMessage = { role: 'user', content: message };
        messages.push(userMessage);
        saveMessages();
        addMessage(formatMessage(userMessage));

        inputField.value = ''; // clear input field

        try {
            const response = await fetch('https://your-vercel-app.vercel.app/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ messages })
            });

            const data = await response.json();

            if (data.reply) {
                messages.push(data.reply);
                saveMessages();
                addMessage(formatMessage(data.reply));
            } else {
                addMessage("toro: i'm busy right now");
            }

        } catch (error) {
            console.error('error:', error);
            addMessage("toro: i'm busy right now");
        }
    }

    function addMessage(text) {
        const chatLog = document.getElementById('chatLog');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.textContent = text;
        chatLog.appendChild(messageDiv);
        chatLog.scrollTop = chatLog.scrollHeight; // scroll to the bottom
    }

    function saveMessages() {
        localStorage.setItem('toroMessages', JSON.stringify(messages));
    }

    function formatMessage(msg) {
        const role = msg.role === 'user' ? 'u' : 'toro';
        return `${role}: ${msg.content}`;
    }

    function clearChat() {
    localStorage.removeItem('toroMessages');
    messages = [];
    const chatLog = document.getElementById('chatLog');
    chatLog.innerHTML = '';
    }

    document.getElementById('chatInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>talk to toro</title>
    <style>
        body {
            background-color: rgba(255, 244, 182, 0.5);
        }

        .center {
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .top-space {
            margin-top: 5%;
        }

        .chat-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 50px;
            background: #FFFEF2;
            border-radius: 10px;
        }

        .message {
            border-bottom: 1px solid rgb(111, 78, 55);
            padding: 10px 0;
        }

        .chat-form {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .chat-form input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid rgb(111, 78, 55);
            border-radius: 4px;
            margin-right: 10px;
        }

        .chat-form input[type="text"]:focus {
            outline: none;
            border-color: rgb(111, 78, 55);
            box-shadow: 0 0 5px pink;
        }

        .chat-form input[type="button"] {
            padding: 10px 20px;
            border: none;
            background-color: rgb(111, 78, 55);
            color: #FFFEF2;
            border-radius: 4px;
            cursor: pointer;
        }

        .medsans {
            color: rgb(111, 78, 55);
            font-family: Assistant, sans-serif;
            font-size: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
<!--toro home button-->
<nav class="center top-space">
    <a href="./index.html"><img
            src="https://www.models-resource.com/resources/big_icons/45/44369.png?updated=1616444557"
            alt="toro" style="height:100px;"></a>
</nav>

<!--chatbot container-->
<div id="toro-chatbot" class="chat-container center medsans">
    <h2>talk to toro</h2>
</div>

<!--load babel for jsx-->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!--chatbot react component -->
<script type="text/babel">
    // define chatbot component
    function Chatbot() {
      const [message, setMessage] = React.useState("");
      const [chatLog, setChatLog] = React.useState([]);

      const handleSubmit = async (e) => {
        e.preventDefault();

        if (message.trim() === "") return; // skip empty messages

        // send the message to the server
        const response = await fetch('http://localhost:5001/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message }),
        });

        const data = await response.json();

        // update chat log with user and bot messages
        setChatLog([
          ...chatLog, 
          { role: "user", content: message }, 
          { role: "bot", content: data.reply }
        ]);

        setMessage(""); // clear input field
      };

      return (
        <div>
          <div>
            {chatLog.map((entry, index) => (
              <p key={index}>
                <strong>{entry.role === "user" ? "You" : "Toro"}:</strong> {entry.content}
              </p>
            ))}
          </div>

          <form onSubmit={handleSubmit} className="chat-form">
            <input 
              type="text" 
              value={message} 
              onChange={(e) => setMessage(e.target.value)} 
              placeholder="talk..."
            />
            <button type="submit">send</button>
          </form>
        </div>
      );
    }

    // render chatbot component in the toro-chatbot div
    ReactDOM.render(<Chatbot />, document.getElementById('toro-chatbot'));
</script>
</body>
</html>

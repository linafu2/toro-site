<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listen</title>
    <style>
        body {
            background-color: rgba(201, 212, 233, 1);
        }

        .center {
            display: block;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .top-space {
            margin-top: 5%;
        }

        .medsans {
            color: rgb(111, 78, 55);
            font-family: Assistant, sans-serif;
            font-size: 15px;
            text-align: center;
        }

        .playlist-container {
            display: none;
            text-align: center;
        }

        .submit input[type="button"] {
            padding: 10px 20px;
            border: none;
            background-color: rgb(111, 78, 55);
            color: #FFFEF2;
            border-radius: 4px;
            cursor: pointer;
        }

        iframe {
            border-radius: 12px;
            width: 500px;
            height: 415px;
            border: 0;
        }

        /* custom radio selection styles */
        .custom-radio {
            position: relative;
            display: inline-block;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            padding-left: 30px;
            margin-right: 10px;
        }

        .custom-radio input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }


        .custom-radio .checkmark::after {
            content: "";
            position: absolute;
            display: none;
        }

        .custom-radio input:checked ~ .checkmark::after {
            display: block;
        }

        .custom-radio-neo .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            border: 2px solid rgb(111, 78, 55);
            border-radius: 50%;
            background-color: white;
        }

        .custom-radio-neo input:checked ~ .checkmark {
            background-color: pink;
        }

        .custom-radio-neo .checkmark::after {
            top: 50%;
            left: 50%;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: white;
            transform: translate(-50%, -50%);
        }

        .custom-radio-orange .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            border: 2px solid rgb(111, 78, 55);
            border-radius: 50%;
            background-color: white;
        }

        .custom-radio-orange input:checked ~ .checkmark {
            background-color: #FFA940;
        }

        .custom-radio-orange .checkmark::after {
            top: 50%;
            left: 50%;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: white;
            transform: translate(-50%, -50%);
        }

        /* media query for mobile devices */
        @media only screen and (max-width: 600px) {
            iframe {
                width: 90%;
            }
        }
    </style>
</head>
<body>
<!--toro home button-->
<nav class="center top-space toro-home-button">
    <a href="./index.html"><img
            src="https://models.spriters-resource.com/media/preview_icons/324/327151.png?updated=1755507305"
            alt="toro" style="height:100px;"></a>
</nav>

<!--choice playlist-->
<br>
<div class="center medsans submit">
    <p>pick an ice cream flavor ∩❛ڡ❛∩</p>
    <form id="choiceForm">
        <label class="custom-radio custom-radio-neo">neapolitan
            <input type="radio" name="icecream" value="neapolitan">
            <span class="checkmark"></span>
        </label><br>
        <label class="custom-radio custom-radio-orange">orange creamsicle
            <input type="radio" name="icecream" value="orange">
            <span class="checkmark"></span>
        </label><br><br>
        <input type="button" value="Submit" onclick="showPlaylist()">
    </form>
</div>

<!--two playlist options-->
<div class="playlist-container" id="playlist1">
    <br>
    <iframe src="https://open.spotify.com/embed/playlist/1PS0DDM82Gaxv59SdyuC33?utm_source=generator"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"></iframe>
    <br>
</div>

<div class="playlist-container" id="playlist2">
    <br>
    <iframe src="https://open.spotify.com/embed/playlist/1VTFJWg5AIt25zCKsL8oSx?utm_source=generator" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy"></iframe>
    <br>
</div>
<br>
<br>
<br>

<script>
    function showPlaylist() {
        let choiceForm = document.getElementById("choiceForm");
        let selectedOption = choiceForm.querySelector('input[name="icecream"]:checked');

        if (selectedOption) {
            let choice = selectedOption.value;
            if (choice === "neapolitan") {
                document.getElementById("playlist1").style.display = "block";
                document.getElementById("playlist2").style.display = "none";
            } else if (choice === "orange") {
                document.getElementById("playlist1").style.display = "none";
                document.getElementById("playlist2").style.display = "block";
            }
        } else {
            alert("please select an option");
        }
    }
</script>

</body>
</html>
